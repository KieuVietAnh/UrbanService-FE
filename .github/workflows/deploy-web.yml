name: Deploy Web to Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Build and deploy React web
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://urbanservice.me

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production env variables
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          test -n "$VITE_API_BASE_URL"
          test -n "$VITE_GOOGLE_CLIENT_ID"
          echo "Production env variables are available"

      - name: Create production env file
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
          EOF

          echo ".env.production created"
          cat .env.production | sed 's/=.*/=***/'

      - name: Build web application
        run: pnpm --dir apps/web build

      - name: Verify build output
        run: |
          test -f apps/web/dist/index.html
          echo "Frontend build completed successfully"
          ls -la apps/web/dist

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Prepare deployment directory
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" '
            if [ "$(id -u)" -eq 0 ]; then
              mkdir -p /var/www/urban-service-fe
              chown -R "$USER:$USER" /var/www/urban-service-fe
            else
              sudo mkdir -p /var/www/urban-service-fe
              sudo chown -R "$USER:$USER" /var/www/urban-service-fe
            fi
          '

      - name: Deploy web files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            apps/web/dist/ \
            "$VPS_USER@$VPS_HOST:/var/www/urban-service-fe/"

      - name: Reload Nginx
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" '
            if [ "$(id -u)" -eq 0 ]; then
              nginx -t && systemctl reload nginx
            else
              sudo nginx -t && sudo systemctl reload nginx
            fi
          '

      - name: Deployment completed
        run: |
          echo "Web deployed successfully"
          echo "URL: http://${{ secrets.VPS_HOST }}"
