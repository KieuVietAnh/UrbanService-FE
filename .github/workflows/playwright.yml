name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/playwright.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/playwright.yml'

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI - install, lint, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web application
        run: pnpm --dir apps/web lint

      - name: Build web application
        run: pnpm --dir apps/web build

      - name: Install Playwright browsers
        run: pnpm --dir apps/web exec playwright install --with-deps

      - name: Run Playwright E2E tests
        working-directory: apps/web
        run: pnpm exec playwright test --project=chromium --project=firefox --project=webkit

      - name: Ensure Playwright report path exists
        if: always()
        run: mkdir -p apps/web/tests/results/html

      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/tests/results/html
